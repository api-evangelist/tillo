naftiko: 1.0.0-alpha2
info:
  label: Tillo Gift Card API — Orders
  description: 'Tillo Gift Card API — Orders. 4 operations. Lead operation: Cancel Order. Self-contained Naftiko capability
    covering one Tillo business surface.'
  tags:
  - Tillo
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TILLO_API_KEY: TILLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: gift-card-orders
    baseUri: https://app.tillo.io/api/v2
    description: Tillo Gift Card API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: digital-cancel
      path: /digital/cancel
      operations:
      - name: cancelorder
        method: POST
        description: Cancel Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: digital-order
      path: /digital/order
      operations:
      - name: orderdigitalcard
        method: POST
        description: Order Digital Gift Card (Async)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: digital-refund
      path: /digital/refund
      operations:
      - name: refundorder
        method: POST
        description: Refund Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: order-status
      path: /order-status
      operations:
      - name: getorderstatus
        method: GET
        description: Get Order Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: client_request_id
          in: query
          type: string
          description: Client-supplied request ID
          required: true
        - name: brand
          in: query
          type: string
          description: Brand identifier slug
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.TILLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gift-card-orders-rest
    port: 8080
    description: REST adapter for Tillo Gift Card API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/digital/cancel
      name: digital-cancel
      description: REST surface for digital-cancel.
      operations:
      - method: POST
        name: cancelorder
        description: Cancel Order
        call: gift-card-orders.cancelorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/digital/order
      name: digital-order
      description: REST surface for digital-order.
      operations:
      - method: POST
        name: orderdigitalcard
        description: Order Digital Gift Card (Async)
        call: gift-card-orders.orderdigitalcard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/digital/refund
      name: digital-refund
      description: REST surface for digital-refund.
      operations:
      - method: POST
        name: refundorder
        description: Refund Order
        call: gift-card-orders.refundorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/order-status
      name: order-status
      description: REST surface for order-status.
      operations:
      - method: GET
        name: getorderstatus
        description: Get Order Status
        call: gift-card-orders.getorderstatus
        with:
          client_request_id: rest.client_request_id
          brand: rest.brand
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gift-card-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tillo Gift Card API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cancel-order
      description: Cancel Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gift-card-orders.cancelorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: order-digital-gift-card-async
      description: Order Digital Gift Card (Async)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gift-card-orders.orderdigitalcard
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: refund-order
      description: Refund Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gift-card-orders.refundorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-status
      description: Get Order Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gift-card-orders.getorderstatus
      with:
        client_request_id: tools.client_request_id
        brand: tools.brand
      outputParameters:
      - type: object
        mapping: $.
