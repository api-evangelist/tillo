naftiko: 1.0.0-alpha2
info:
  label: Tillo Gift Card API — Balance
  description: 'Tillo Gift Card API — Balance. 1 operations. Lead operation: Check Gift Card Balance. Self-contained Naftiko
    capability covering one Tillo business surface.'
  tags:
  - Tillo
  - Balance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TILLO_API_KEY: TILLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: gift-card-balance
    baseUri: https://app.tillo.io/api/v2
    description: Tillo Gift Card API — Balance business capability. Self-contained, no shared references.
    resources:
    - name: digital-check-balance
      path: /digital/check-balance
      operations:
      - name: checkbalance
        method: POST
        description: Check Gift Card Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.TILLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gift-card-balance-rest
    port: 8080
    description: REST adapter for Tillo Gift Card API — Balance. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/digital/check-balance
      name: digital-check-balance
      description: REST surface for digital-check-balance.
      operations:
      - method: POST
        name: checkbalance
        description: Check Gift Card Balance
        call: gift-card-balance.checkbalance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gift-card-balance-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tillo Gift Card API — Balance. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: check-gift-card-balance
      description: Check Gift Card Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: gift-card-balance.checkbalance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
