apis:
  - aid: tillo:tillo-gift-card-api
    name: Tillo Gift Card API
    description: >-
      The Tillo Gift Card API enables businesses to issue digital and physical gift cards from 4,000+ global brands.
      Supports synchronous and asynchronous card issuance, balance checking, refunds, order status checking, and brand
      catalog retrieval.
    humanURL: https://www.tillo.io/gift-card-api
    baseURL: https://app.tillo.io
    tags:
