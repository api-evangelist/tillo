  - aid: tillo:tillo-float-api
    name: Tillo Float Management API
    description: >-
      Manages Tillo float accounts including balance retrieval, payment
      transfer requests, and transfer status tracking.
    humanURL: https://tillo.tech/v2_docs/floats.html
