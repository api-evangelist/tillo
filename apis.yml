aid: tillo
name: Tillo
description: >-
  Tillo is an award-winning gift card API platform connecting businesses to
  4,000+ global brands across 37 markets and 16 currencies. The REST API
  supports digital and physical gift card issuance, balance checking, float
  management, and brand catalog access. Authentication uses HMAC-SHA256
  signatures.
type: Index
position: Consumer
access: 3rd-Party
